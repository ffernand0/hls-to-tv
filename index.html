<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <link rel="apple-touch-icon" href="/vite.svg">
    <link rel="mask-icon" href="/vite.svg" color="#0f172a">
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0f172a" />
    <meta name="description" content="Cast HLS streams to Chromecast from a PWA">
    <title>HLS Caster PWA</title>
    <!-- Google Cast SDK -->
    <script type="text/javascript" src="https://www.gstatic.com/cv/js/sender/v1/cast_sender.js?loadCastFramework=1"></script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      // Cast SDK context variable to be set initially before initializing app completely
      window.__onGCastApiAvailable = function(isAvailable) {
        if (isAvailable && window.cast && window.cast.framework) {
          try {
            cast.framework.CastContext.getInstance().setOptions({
              receiverApplicationId: chrome.cast.media.DEFAULT_MEDIA_RECEIVER_APP_ID,
              autoJoinPolicy: chrome.cast.AutoJoinPolicy.ORIGIN_SCOPED
            });
          } catch(e) {
            console.error('Error initializing cast context', e);
          }
        }
      };
    </script>
  </body>
</html>
